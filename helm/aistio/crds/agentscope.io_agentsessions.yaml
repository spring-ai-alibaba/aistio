  name: agentsessions.agentscope.io
spec:
  group: agentscope.io
  names:
    kind: AgentSession
    listKind: AgentSessionList
    plural: agentsessions
    shortNames:
    - as
    singular: agentsession
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentRef.name
      name: Agent
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.messageCount
