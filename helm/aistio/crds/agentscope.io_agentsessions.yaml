      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentSession represents a session on a managed agent.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentSessionSpec defines the desired state of AgentSession.
            properties:
              agentRef:
                description: ObjectReference refers to a Kubernetes object.
                properties:
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              commands:
                description: Commands for control plane to execute on this session.
                properties:
                  compress:
                    description: Set to true to trigger context compression.
                    type: boolean
                  terminate:
                    description: Set to true to trigger session termination.
                    type: boolean
                type: object
            required:
            - agentRef
            type: object
          status:
