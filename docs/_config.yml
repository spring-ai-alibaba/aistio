project: "Aistio"
title: "<span style='font-weight: 700; color: #5b5bd6;'>Aistio</span>"
author: The Aistio Authors
logo: _static/logo.svg
copyright: "The Aistio Authors"
only_build_toc_files: true

execute:
  execute_notebooks: off

parse:
  myst_enable_extensions:
    - colon_fence

latex:
  latex_documents:
    targetname: book.tex

bibtex_bibfiles:
  - references.bib

sphinx:
  extra_extensions:
    - sphinxcontrib.mermaid
  config:
    language: zh_CN
    mermaid_version: "11.12.1"
    html_theme: furo
    pygments_style: "friendly"
    html_favicon: _static/logo.svg
    html_show_sphinx: false
    html_last_updated_fmt: "%Y-%m-%d"
    html_copy_source: false
    html_show_sourcelink: false
    templates_path: ["./_templates"]
    html_static_path:
      - "_static"
    use_multitoc_numbering: false
    html_js_files:
      - tabs.js
    html_css_files:
      - custom.css
    html_context:
      docs_top_tabs:
        - id: home
          label_zh: 首页
          href_zh: zh/intro
          prefixes_zh:
            - zh/intro
          sections_zh: []
          languages:
            - zh
        - id: guide
          label_zh: 使用指南
          href_zh: zh/getting-started/installation
          prefixes_zh:
            - zh/getting-started
            - zh/concepts
            - zh/guides
          sections_zh:
            - 快速开始
            - 核心概念
            - 智能体管理
          languages:
            - zh
        - id: reference
          label_zh: 接口参考
          href_zh: zh/reference/data-plane-contract
          prefixes_zh:
            - zh/reference
          sections_zh:
            - 接口参考
          languages:
            - zh
        - id: experimental
          label_zh: 实验功能
          href_zh: zh/experimental/teams-and-sandbox
          prefixes_zh:
            - zh/experimental
          sections_zh:
            - 实验功能
          languages:
            - zh
        - id: operations
          label_zh: 部署与运维
          href_zh: zh/operations/deployment
          prefixes_zh:
            - zh/operations
          sections_zh:
            - 部署与运维
          languages:
            - zh
        - id: community
          label_zh: 帮助与社区
          href_zh: zh/faq/index
          prefixes_zh:
            - zh/faq
            - zh/community
          sections_zh:
            - 帮助与社区
          languages:
            - zh
    html_sidebars:
      "**":
        - "sidebar/scroll-start.html"
        - "sidebar/brand.html"
        - "sidebar/navigation.html"
        - "sidebar/ethical-ads.html"
        - "sidebar/scroll-end.html"
    html_theme_options:
      top_of_page_buttons: ["view"]
      sidebar_hide_name: true
      source_repository: "https://github.com/spring-ai-alibaba/aistio"
      source_branch: "main"
      source_directory: "docs/"
      light_css_variables:
        color-brand-primary: "#5b5bd6"
        color-brand-content: "#4545b8"
      dark_css_variables:
        color-brand-primary: "#a5a5ff"
        color-brand-content: "#b8b8ff"
