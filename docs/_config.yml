project: "AgentScope Go"
title: "<span style='font-weight: 700; color: #2196f3;'>AgentScope Go</span>"
author: The AgentScope Go Authors
logo: _static/logo.svg
copyright: "The AgentScope Go Authors"
only_build_toc_files: true

execute:
  execute_notebooks: off

parse:
  myst_enable_extensions:
    - colon_fence

latex:
  latex_documents:
    targetname: book.tex

bibtex_bibfiles:
  - references.bib

sphinx:
  extra_extensions:
    - sphinxcontrib.mermaid
  config:
    mermaid_version: "11.12.1"
    html_theme: furo
    pygments_style: "friendly"
    html_favicon: _static/logo.svg
    html_show_sphinx: false
    html_last_updated_fmt: "%Y-%m-%d"
    html_copy_source: false
    html_show_sourcelink: false
    templates_path: ["./_templates"]
    html_static_path:
      - "_static"
    use_multitoc_numbering: false
    html_js_files:
      - language.js
      - tabs.js
    html_css_files:
      - custom.css
    html_context:
      docs_top_tabs:
        - id: home
          label_en: Home
          label_zh: 首页
          href_en: en/intro
          href_zh: zh/intro
          prefixes_en:
            - en/intro
          prefixes_zh:
            - zh/intro
          sections_en: []
          sections_zh: []
          languages:
            - en
            - zh
        - id: docs
          label_en: Docs
          label_zh: 文档
          href_en: en/quickstart/installation
          href_zh: zh/quickstart/feature-overview
          prefixes_en:
            - en/quickstart
            - en/task
            - en/faq
          prefixes_zh:
            - zh/quickstart
            - zh/task
            - zh/faq
          sections_en:
            - Quick Start
            - Advanced Topics
            - FAQ
          sections_zh:
            - 快速开始
            - 高级主题
            - 常见问题 FAQ
          languages:
            - en
            - zh
        - id: integration
          label_en: Integration
          label_zh: 集成
          href_en: en/integration/index
          href_zh: zh/integration/index
          prefixes_en:
            - en/integration
          prefixes_zh:
            - zh/integration
          sections_en:
            - Integration
          sections_zh:
            - 集成
          languages:
            - en
            - zh
        - id: blogs
          label_en: Blogs
          label_zh: 博客
          href_en: en/blogs/index
          href_zh: zh/blogs/index
          prefixes_en:
            - en/blogs
          prefixes_zh:
            - zh/blogs
          sections_en:
            - Blogs
          sections_zh:
            - 博客
          languages:
            - en
            - zh
        - id: community
          label_en: Community
          label_zh: 社区
          href_en: en/community/contributors
          href_zh: zh/community/contributors
          prefixes_en:
            - en/community
          prefixes_zh:
            - zh/community
          sections_en:
            - Community
          sections_zh:
            - 社区
          languages:
            - en
            - zh
    html_sidebars:
      "**":
        - "sidebar/scroll-start.html"
        - "sidebar/brand.html"
        - "sidebar/navigation.html"
        - "sidebar/ethical-ads.html"
        - "sidebar/scroll-end.html"
    html_theme_options:
      top_of_page_buttons: ["view"]
      sidebar_hide_name: true
      source_repository: "https://github.com/yuluo-yx/agentscope-go"
      source_branch: "main"
      source_directory: "docs/"
      light_css_variables:
        color-brand-primary: "#2196f3"
        color-brand-content: "#0b5cad"
      dark_css_variables:
        color-brand-primary: "#64b5f6"
        color-brand-content: "#64b5f6"
