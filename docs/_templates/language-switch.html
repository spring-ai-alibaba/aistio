<div class="language-switch">
  <div class="language-selector">
    <button class="language-button" type="button" aria-expanded="false" onclick="return toggleLanguageMenu()">
      <span id="current-lang">{% if pagename.startswith("zh/") %}中文{% else %}English{% endif %}</span>
    </button>
    <div class="language-menu" id="language-menu">
      <a href="#" class="language-option" data-lang="en" onclick="return switchLanguage('en')">English</a>
      <a href="#" class="language-option" data-lang="zh" onclick="return switchLanguage('zh')">中文</a>
    </div>
  </div>
</div>

<script>
  window.sidebarCaptionLanguage = {
    'Quick Start': 'en',
    'Advanced Topics': 'en',
    'FAQ': 'en',
    'Integration': 'en',
    'Blogs': 'en',
    'Community': 'en',
    '首页': 'zh',
    '快速开始': 'zh',
    '高级主题': 'zh',
    '常见问题 FAQ': 'zh',
    '集成': 'zh',
    '博客': 'zh',
    '社区': 'zh',
  };

  function getRelativeDocsPath(targetPath) {
    const languageMatch = window.location.pathname.match(/\/(en|zh)\//);
    if (!languageMatch || languageMatch.index === undefined) {
      return targetPath;
    }
    const docsRoot = window.location.pathname.slice(0, languageMatch.index + 1);
    return `${docsRoot}${targetPath}`;
  }

  function updateBrandLink(lang) {
    const brand = document.querySelector('.sidebar-brand');
    if (brand) {
      brand.setAttribute('href', getRelativeDocsPath(`${lang}/intro.html`));
    }
  }

  function updateActiveLanguage(lang) {
    document.querySelectorAll('.language-option').forEach((option) => {
      option.classList.toggle('active', option.dataset.lang === lang);
    });
  }

  function markSidebarLanguageGroups(tree) {
    let currentGroupLanguage = null;

    Array.from(tree.children).forEach((child) => {
      if (child.classList.contains('caption')) {
        const caption = child.textContent.trim();
        currentGroupLanguage = window.sidebarCaptionLanguage[caption] || null;
      }

      if (currentGroupLanguage) {
        child.dataset.sidebarLanguage = currentGroupLanguage;
      } else {
        delete child.dataset.sidebarLanguage;
      }
    });
  }

  function filterSidebarLanguage(lang, root) {
    const trees = [];
    const scope = root || document;

    if (scope.matches && scope.matches('.sidebar-tree')) {
      trees.push(scope);
    }
    scope.querySelectorAll?.('.sidebar-tree').forEach((tree) => {
      trees.push(tree);
    });

    trees.forEach((tree) => {
      markSidebarLanguageGroups(tree);

      Array.from(tree.children).forEach((child) => {
        const itemLanguage = child.dataset.sidebarLanguage;
        if (itemLanguage) {
          const shouldHide = itemLanguage !== lang;
          child.hidden = shouldHide;
          child.classList.toggle('sidebar-language-hidden', shouldHide);
          child.setAttribute('aria-hidden', shouldHide ? 'true' : 'false');
        }
      });
    });
  }

  window.filterSidebarLanguage = filterSidebarLanguage;

  function toggleLanguageMenu() {
    const selector = document.querySelector('.language-selector');
    const button = selector.querySelector('.language-button');
    const isOpen = selector.classList.toggle('open');
    if (button) {
      button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }
    return false;
  }

  function switchLanguage(lang, skipRedirect = false) {
    localStorage.setItem('preferred-language', lang);

    const currentLang = document.getElementById('current-lang');
    currentLang.textContent = lang === 'zh' ? '中文' : 'English';
    document.body.setAttribute('data-current-lang', lang);
    updateActiveLanguage(lang);
    updateBrandLink(lang);
    filterSidebarLanguage(lang);

    if (!skipRedirect) {
      const currentPath = window.location.pathname;
      let newPath = null;

      if (lang === 'zh' && currentPath.includes('/en/')) {
        newPath = currentPath.replace('/en/', '/zh/');
      } else if (lang === 'en' && currentPath.includes('/zh/')) {
        newPath = currentPath.replace('/zh/', '/en/');
      }
      if (newPath && newPath !== currentPath) {
        window.location.href = newPath + window.location.search + window.location.hash;
        return false;
      }
    }

    const selector = document.querySelector('.language-selector');
    selector.classList.remove('open');
    const button = selector.querySelector('.language-button');
    if (button) {
      button.setAttribute('aria-expanded', 'false');
    }
    return false;
  }

  document.addEventListener('click', function (event) {
    if (!event.target.closest('.language-selector')) {
      const selector = document.querySelector('.language-selector');
      selector.classList.remove('open');
      const button = selector.querySelector('.language-button');
      if (button) {
        button.setAttribute('aria-expanded', 'false');
      }
    }
  });
</script>
